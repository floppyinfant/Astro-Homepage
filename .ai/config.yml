# config fuer Continue Extension in VScode for local AI model using LM Studio
# https://marketplace.visualstudio.com/items?itemName=Continue.continue&ssr=false#review-details
# https://github.com/continuedev/continue

name: Local Config
version: 1.0.0
schema: v1

models:
  - name: Qwen 3.6 27B
    provider: lmstudio
    model: qwen/qwen3.6-27b
    apiBase: http://localhost:1234/v1
    roles:
      - chat
      - edit
      - apply

  - name: Qwen3.5 9B
    provider: lmstudio
    model: qwen/qwen3.5-9b
    apiBase: http://localhost:1234/v1
    roles:
      - autocomplete

  - name: Nomic Embed
    provider: lmstudio
    model: text-embedding-nomic-embed-text-v1.5-embedding
    apiBase: http://localhost:1234/v1
    roles:
      - embed
